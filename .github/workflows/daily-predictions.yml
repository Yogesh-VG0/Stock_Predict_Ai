name: Daily ML Predictions

on:
  schedule:
    # Mon-Fri. Use a buffer after close (covers EST/EDT better than 21:30 UTC)
    - cron: "15 22 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-ml-predictions
  cancel-in-progress: false

env:
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  PYTHONIOENCODING: utf-8
  # FMP free tier returns 403 on /api/v3/sec_filings — skip FMP SEC fallback
  # to avoid noisy errors. Kaleidoscope is the primary SEC filings source.
  SKIP_SEC_FMP: "true"

jobs:
  update-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml_backend/requirements-prod.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml_backend/requirements-prod.txt

      - name: Run sentiment cron (populate sentiment data)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          KALEIDOSCOPE_API_KEY: ${{ secrets.KALEIDOSCOPE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: "StockPredictAI/1.0"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "===== Running sentiment cron ====="
          python -m ml_backend.sentiment_cron && {
            echo "SENTIMENT_FRESH=true" >> $GITHUB_ENV
          } || {
            echo "::warning::Sentiment cron failed — predictions will use stale sentiment data"
            echo "SENTIMENT_FRESH=false" >> $GITHUB_ENV
          }

      - name: Train pooled model on all 75 tickers
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          KALEIDOSCOPE_API_KEY: ${{ secrets.KALEIDOSCOPE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: "StockPredictAI/1.0"
          PYTHONPATH: ${{ github.workspace }}
          GITHUB_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -e
          echo "===== Training pooled model on ALL 75 tickers ====="
          # Train on the full cross-section so the pooled model sees all
          # tickers.  --no-predict skips storing predictions (handled in
          # the batch loop below).
          python -m ml_backend.scripts.run_pipeline --all-tickers --no-predict

      - name: Generate predictions (sequential batches)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          KALEIDOSCOPE_API_KEY: ${{ secrets.KALEIDOSCOPE_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: "StockPredictAI/1.0"
          PYTHONPATH: ${{ github.workspace }}
          GITHUB_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          SENTIMENT_FRESH: ${{ env.SENTIMENT_FRESH }}
        run: |
          set -e

          # 8 batches × ~9-10 tickers = 75 stocks
          # Models are already trained above; --predict-only loads them from disk.
          BATCHES=(
            "AAPL MSFT NVDA GOOGL META AVGO ORCL CRM AMD INTC"
            "CSCO ADBE QCOM TXN INTU AMAT IBM PYPL PLTR"
            "AMZN TSLA HD NFLX LOW SBUX NKE MCD DIS BKNG"
            "TGT JPM V MA BAC WFC GS MS AXP C"
            "BRK-B XOM CVX JNJ UNH LLY PFE ABBV MRK AMGN"
            "GILD ISRG CVS WMT COST PG KO PEP MDLZ"
            "CAT HON BA RTX LMT DE GE FDX UPS"
            "CMCSA VZ T CHTR TMUS LIN NEE AMT"
          )

          FAILED_BATCHES=()
          for idx in "${!BATCHES[@]}"; do
            BATCH="${BATCHES[$idx]}"
            BATCH_NUM=$((idx + 1))
            echo ""
            echo "===== Batch $BATCH_NUM/${#BATCHES[@]}: $BATCH ====="

            SUCCESS=0
            for attempt in 1 2 3; do
              echo "  Attempt $attempt..."
              if python -m ml_backend.scripts.run_pipeline --predict-only --tickers $BATCH 2>&1 | tee "batch_${BATCH_NUM}_attempt_${attempt}.log"; then
                SUCCESS=1
                break
              fi
              
              if grep -q "No saved models found" "batch_${BATCH_NUM}_attempt_${attempt}.log" 2>/dev/null; then
                echo "  *** CRITICAL: No saved models found. Failing job immediately. ***"
                exit 1
              fi

              echo "  Attempt $attempt failed. Last error:"
              tail -50 "batch_${BATCH_NUM}_attempt_${attempt}.log" || echo "  (log file not found)"
              sleep $((attempt * 20))
            done

            if [ "$SUCCESS" -eq 0 ]; then
              echo "  *** Batch $BATCH_NUM FAILED after 3 attempts ***"
              FAILED_BATCHES+=("$BATCH_NUM")
            fi

            # Rate limit: pause between batches (API courtesy — paces Finnhub 60/min)
            if [ "$BATCH_NUM" -lt "${#BATCHES[@]}" ]; then
              sleep 10
            fi
          done

          echo ""
          echo "===== Pipeline Summary ====="
          echo "Total batches: ${#BATCHES[@]}"
          echo "Failed batches: ${#FAILED_BATCHES[@]}"
          if [ "${#FAILED_BATCHES[@]}" -gt 0 ]; then
            echo "Failed batch numbers: ${FAILED_BATCHES[*]}"
            # Fail the job if more than 25% of batches failed (2 of 8)
            if [ "${#FAILED_BATCHES[@]}" -gt 1 ]; then
              echo "Too many failures (${#FAILED_BATCHES[@]}/8 batches failed) — failing job."
              exit 1
            fi
            echo "Partial success — continuing."
          fi

      - name: Verify predictions are fresh
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: |
          python - << 'PY'
          import os
          from datetime import datetime, timedelta
          from pymongo import MongoClient

          uri = os.getenv("MONGODB_URI")
          if not uri:
            raise SystemExit("Missing MONGODB_URI")

          client = MongoClient(uri, serverSelectionTimeoutMS=8000, connectTimeoutMS=8000)
          client.admin.command("ping")
          # Use the same database name as MongoDBClient ("stock_predictor")
          db = client["stock_predictor"]
          col = db["stock_predictions"]

          from datetime import timezone
          # Naive-UTC for MongoDB comparison (avoids deprecated utcnow)
          now = datetime.now(timezone.utc).replace(tzinfo=None)
          cutoff = now - timedelta(hours=3)

          horizons = ["next_day", "7_day", "30_day"]

          # Check a representative sample (canary tickers from each batch)
          canary = ["AAPL", "AMZN", "JPM", "XOM", "WMT", "CAT", "CMCSA", "NEE"]
          missing = []
          stale = []

          for t in canary:
            for w in horizons:
              q = {"ticker": t, "window": {"$eq": w}}
              doc = col.find_one(q, sort=[("timestamp", -1)])
              if not doc:
                missing.append((t, w))
                continue
              ts = doc.get("timestamp")
              if not ts or ts < cutoff:
                stale.append((t, w, ts))

          # Also check total doc count to ensure scale
          total = col.count_documents({"timestamp": {"$gte": cutoff}})
          print(f"Fresh docs in last 3h: {total}")
          print(f"Canary check: {len(canary)} tickers x {len(horizons)} horizons")
          if missing:
            print("Missing:", missing)
          if stale:
            print("Stale:", stale)

          assert not missing, f"Missing predictions: {missing}"
          assert not stale, f"Stale predictions: {stale}"
          assert total >= 210, f"Expected >= 210 fresh docs (75 tickers x 3 horizons = 225), got {total}"
          print("Freshness verified")
          PY

      - name: Generate SHAP feature importance
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "===== Running SHAP analysis for all 75 tickers ====="
          # Wall-clock budget: reserve 25 min for AI explanations + evaluate + drift + retention
          SHAP_BUDGET_SEC=$((80 * 60))   # 80 minutes max for entire SHAP step
          SHAP_START=$SECONDS
          # Per-batch budget (each batch gets up to 15 min)
          BATCH_MAX_MIN=15

          TICKER_BATCHES=(
            "AAPL MSFT NVDA GOOGL META AVGO ORCL CRM AMD INTC"
            "CSCO ADBE QCOM TXN INTU AMAT IBM PYPL PLTR"
            "AMZN TSLA HD NFLX LOW SBUX NKE MCD DIS BKNG"
            "TGT JPM V MA BAC WFC GS MS AXP C"
            "BRK-B XOM CVX JNJ UNH LLY PFE ABBV MRK AMGN"
            "GILD ISRG CVS WMT COST PG KO PEP MDLZ"
            "CAT HON BA RTX LMT DE GE FDX UPS"
            "CMCSA VZ T CHTR TMUS LIN NEE AMT"
          )
          SHAP_FAILED=0
          SHAP_SKIPPED=0
          SHAP_OK=0
          for batch in "${TICKER_BATCHES[@]}"; do
            ELAPSED=$((SECONDS - SHAP_START))
            if [ "$ELAPSED" -gt "$SHAP_BUDGET_SEC" ]; then
              echo "::warning::SHAP time budget exhausted (${ELAPSED}s > ${SHAP_BUDGET_SEC}s) — skipping remaining batches"
              SHAP_SKIPPED=$((SHAP_SKIPPED + 1))
              continue
            fi
            if python -m ml_backend.explain.shap_analysis --tickers $batch --max-minutes $BATCH_MAX_MIN; then
              SHAP_OK=$((SHAP_OK + 1))
            else
              echo "::warning::SHAP batch failed: $batch"
              SHAP_FAILED=$((SHAP_FAILED + 1))
            fi
          done
          echo "SHAP batches: OK=$SHAP_OK, failed=$SHAP_FAILED / ${#TICKER_BATCHES[@]}, skipped=$SHAP_SKIPPED"
          # SHAP is non-fatal — always continue to AI explanations, evaluation, drift, retention.
          # Log a warning if most batches failed so we can investigate, but don't exit 1.
          if [ "$SHAP_FAILED" -gt 5 ]; then
            echo "::warning::Most SHAP batches failed ($SHAP_FAILED/${#TICKER_BATCHES[@]}) — feature importance may be stale"
          fi

      - name: Generate AI explanations (Groq/Gemini)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          AI_EXPLANATION_BUDGET_MIN: "90"
        run: |
          echo "===== Generating AI explanations (Groq preferred, Gemini fallback) ====="
          echo "Time budget: ${AI_EXPLANATION_BUDGET_MIN:-35} minutes"
          timeout "${AI_EXPLANATION_BUDGET_MIN:-35}m" \
            python -m ml_backend.scripts.generate_explanations || {
            RC=$?
            if [ "$RC" -eq 124 ]; then
              echo "::warning::AI explanations hit time budget (${AI_EXPLANATION_BUDGET_MIN:-35}m) — partial explanations generated"
            else
              echo "::warning::AI explanation generation failed (exit $RC) — predictions will lack AI commentary"
            fi
          }

      - name: Evaluate stored predictions (last 60 days)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "===== Running evaluate_models --stored ====="
          python -m ml_backend.scripts.evaluate_models --stored --days 180 \
            | tee eval_report.txt || echo "Evaluation failed (non-fatal)"

      - name: Run drift monitor
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "===== Running drift_monitor ====="
          python -m ml_backend.scripts.drift_monitor \
            | tee drift_report.txt || echo "Drift monitor failed (non-fatal)"

      - name: Data retention cleanup (remove data older than 12 months)
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "===== Running data retention cleanup ====="
          python -m ml_backend.scripts.data_retention \
            | tee retention_report.txt || echo "Retention cleanup failed (non-fatal)"

      - name: Upload logs/artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: |
            ml_backend/**/*.log
            **/*.log
            batch_*_attempt_*.log
            eval_report.txt
            drift_report.txt
            retention_report.txt
          if-no-files-found: ignore
